services:
  - type: web
    name: securecode-backend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: .
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DATABASE_URL
        value: sqlite:////var/data/sqlite.db
      - key: APP_STORAGE_PATH
        value: /var/data
      - key: REPORTS_DIR
        value: /var/data/reports
      - key: TEMP_REPOS_DIR
        value: /var/data/temp_repos
      - key: TEMP_SCANS_DIR
        value: /var/data/tmp_scans
      - key: VECTOR_STORE_PATH
        value: /var/data/data/vector_store.json
      - key: AI_PROVIDER
        value: local
    disks:
      - name: securecode-disk
        mountPath: /var/data
        sizeGB: 1
